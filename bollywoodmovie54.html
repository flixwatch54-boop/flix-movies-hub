<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Download Hub - Premium Player</title>

    <style>
        :root { --accent:#00bcd4; --bg:#0f0f0f; --card:#1e1e1e; --sub:#2a2a2a; }

        body {
            margin:0;
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background:var(--bg);
            color:white;
        }

        .container {
            max-width:900px;
            margin:15px auto;
            padding:15px;
            background:var(--card);
            border-radius:12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .movie-box { display:flex; flex-wrap:wrap; gap:15px; }

        .poster {
            width:260px;
            aspect-ratio:2/3;
            border-radius:10px;
            object-fit:cover;
            border: 1px solid #333;
        }

        .details {
            flex:1;
            background:var(--sub);
            padding:15px;
            border-radius:10px;
            font-size: 14px;
        }

        h1 { color:var(--accent); margin: 0 0 10px 0; font-size: 24px; }
        h3 { border-left: 3px solid var(--accent); padding-left: 10px; margin: 25px 0 12px 0; font-size: 18px; color: #eee; }

        .trailer-section {
            max-width: 750px;
            margin: 20px auto;
            display: none;
        }

        .player-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #333;
        }

        #player {
            position: absolute;
            top: -55px; 
            left: 0;
            width: 100%;
            height: calc(100% + 110px);
            z-index: 1;
            background: #000;
        }

        /* --- VOLUME PANEL ALWAYS VISIBLE FIX --- */
        .volume-panel {
            margin-top: 10px;
            display: flex !important; /* Forces it to be always visible */
            align-items: center;
            gap: 12px;
            background: var(--sub);
            padding: 8px 15px;
            border-radius: 8px;
            width: fit-content;
            border-left: 3px solid var(--accent);
        }

        .vol-icon {
            font-size: 18px;
            cursor: pointer;
            user-select: none;
            color: var(--accent);
        }

        #volume-slider {
            cursor: pointer;
            width: 100px;
            height: 4px;
            accent-color: var(--accent);
            outline: none;
        }

        .video-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: 0.5s ease;
            cursor: pointer;
        }

        .video-overlay::before {
            content: "";
            position: absolute;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
        }

        .play-btn {
            width: 70px;
            height: 70px;
            background: rgba(0, 188, 212, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 11;
            border: 3px solid white;
            transition: 0.3s;
        }

        .play-btn::after {
            content: "";
            border-style: solid;
            border-width: 12px 0 12px 20px;
            border-color: transparent transparent transparent white;
            margin-left: 5px;
        }

        .ss-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .ss-grid img { width: 100%; border-radius: 6px; border: 1px solid #444; }

        .download-section { text-align:center; margin-top:20px; padding:15px; background:var(--sub); border-radius:10px; }
        
        .download-btn { 
            display:inline-block; 
            margin:5px; 
            padding:12px 22px; 
            background:var(--accent); 
            color:white; 
            text-decoration:none; 
            border-radius:8px; 
            font-weight: bold; 
            font-size: 15px; 
            line-height: 1.2;
            min-width: 110px;
            transition: 0.3s;
        }
        
        .size-text { display:block; font-size: 11px; color: #b0e0e6; opacity: 0.8; margin-top: 4px;}

        @media (max-width: 600px) {
            .ss-grid { grid-template-columns: repeat(2, 1fr); }
            .poster { width: 100%; }
            .movie-box { flex-direction: column; }
            #volume-slider { width: 80px; } 
        }
    </style>
</head>
<body>

<div class="container">
    <p id="loading" style="text-align:center; color:#999; padding:20px;">Fetching Cinematic Data...</p>

    <div class="movie-box" id="content-box" style="display:none;">
        <img class="poster" id="poster" alt="Movie Poster">
        <div class="details">
            <h1 id="title"></h1>
            <p><strong>⭐ Rating:</strong> <span id="rating"></span></p>
            <p><strong>Genre:</strong> <span id="genre"></span></p>
            <p><strong>Language:</strong> <span id="lang"></span></p>
            <p><strong>Quality:</strong> <span id="quality"></span></p>
            <p><strong>Duration:</strong> <span id="duration"></span></p>
            <p><strong>Story:</strong><br><span id="plot" style="color:#ccc; line-height:1.5;"></span></p>
        </div>
    </div>

    <div class="trailer-section" id="trailer-section">
        <h3>Official Trailer</h3>
        <div class="player-wrapper">
            <div class="video-overlay" id="video-overlay" onclick="playTrailer()">
                <div class="play-btn"></div>
            </div>
            <div id="player"></div> 
        </div>
        <div class="volume-panel" id="vol-panel">
            <span class="vol-icon" onclick="toggleMute()" id="vol-icon">🔊</span>
            <input type="range" id="volume-slider" min="0" max="100" value="100" oninput="changeVolume(this.value)">
        </div>
    </div>

    <div class="screenshots" id="ss-section" style="display:none;">
        <h3>Screenshots</h3>
        <div class="ss-grid" id="screens"></div>
    </div>

    <div class="download-section" id="dl-section" style="display:none;">
        <h3>Download Links</h3>
        <div id="download-buttons"></div>
    </div>
</div>

<script>
const API_KEY = "ee08ccfff7200834fd2ac18bdd8fd552"; 
const MOVIE = "Ferrari Ki Sawaari";
const YEAR = "2012";    

const FILE = {
    lang: "Hindi",
    quality: "480p | 720p | 1080p - BluRay",
    sizes: { p480: "350MB", p720: "1.1GB", p1080: "3.8GB" },
    links: { 
        p480: "https://vcloud.zip/cm1z4i5kzscimvz", 
        p720: "https://vcloud.zip/blexjjotngjj0bo",
        p1080:"https://vcloud.zip/jbjggr3b713wott",
    }
};

let trailerID = ""; 
let player = null; 
let checkInterval; 

function startDownload(btn, url) {
    let originalContent = btn.innerHTML;
    let seconds = 3;
    btn.style.pointerEvents = "none";
    btn.style.background = "#555";
    const countdown = setInterval(() => {
        btn.innerHTML = `Wait ${seconds}s...`;
        seconds--;
        if (seconds < 0) {
            clearInterval(countdown);
            btn.innerHTML = originalContent;
            btn.style.pointerEvents = "auto";
            btn.style.background = "var(--accent)";
            window.open(url, "_blank");
        }
    }, 1000);
}

var tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
var firstScriptTag = document.getElementsByTagName('script')[0];
firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

function playTrailer() {
    if(!trailerID) return;
    document.getElementById("video-overlay").style.display = "none";
    // Yahan se hide/show logic remove kar di gayi hai
    player = new YT.Player('player', {
        height: '100%', width: '100%', videoId: trailerID,
        playerVars: { 'autoplay': 1, 'controls': 1, 'modestbranding': 1, 'rel': 0 },
        events: { 'onStateChange': onPlayerStateChange, 'onReady': onPlayerReady }
    });
}

function changeVolume(val) {
    if (player && player.setVolume) {
        player.setVolume(val);
        document.getElementById("vol-icon").innerText = val == 0 ? "🔇" : "🔊";
    }
}

function toggleMute() {
    if (player && player.isMuted()) {
        player.unMute();
        document.getElementById("vol-icon").innerText = "🔊";
        document.getElementById("volume-slider").value = 100;
    } else if (player) {
        player.mute();
        document.getElementById("vol-icon").innerText = "🔇";
        document.getElementById("volume-slider").value = 0;
    }
}

function onPlayerReady(event) {
    checkInterval = setInterval(() => {
        if (player && player.getDuration) {
            let curr = player.getCurrentTime();
            let dur = player.getDuration();
            if (dur > 0 && (dur - curr < 1.5)) closePlayer();
        }
    }, 500);
}

function onPlayerStateChange(event) {
    if (event.data == YT.PlayerState.ENDED) closePlayer();
}

function closePlayer() {
    clearInterval(checkInterval);
    if(player) { player.destroy(); player = null; }
    document.getElementById("video-overlay").style.display = "flex";
    // Volume button ko hide karne wali line yahan se remove kar di hai
}

function runtime(m) { return !m ? "N/A" : Math.floor(m/60) + "h " + (m%60) + "m"; }

async function load() {
    try {
        let search = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${encodeURIComponent(MOVIE)}&primary_release_year=${YEAR}`);
        let data = await search.json();
        if(!data.results.length) { document.getElementById("loading").innerText = "Not Found ❌"; return; }
        let res = await fetch(`https://api.themoviedb.org/3/movie/${data.results[0].id}?api_key=${API_KEY}&append_to_response=images,videos`);
        let m = await res.json();
        document.getElementById("loading").style.display = "none";
        document.getElementById("content-box").style.display = "flex";
        document.getElementById("dl-section").style.display = "block";
        document.getElementById("title").innerText = m.title + " (" + m.release_date.slice(0,4) + ")";
        document.getElementById("poster").src = "https://image.tmdb.org/t/p/w500" + m.poster_path;
        document.getElementById("rating").innerText = m.vote_average.toFixed(1) + "/10";
        document.getElementById("genre").innerText = m.genres.map(g => g.name).join(", ");
        document.getElementById("plot").innerText = m.overview;
        document.getElementById("duration").innerText = runtime(m.runtime);
        document.getElementById("lang").innerText = FILE.lang;
        document.getElementById("quality").innerText = FILE.quality;

        const db = document.getElementById("download-buttons");
        db.innerHTML = "";
        Object.keys(FILE.links).forEach(q => {
            db.innerHTML += `<a href="javascript:void(0)" onclick="startDownload(this, '${FILE.links[q]}')" class="download-btn">${q.replace("p","")}p<br><span class='size-text'>${FILE.sizes[q]}</span></a>`;
        });

        if(m.videos && m.videos.results.length > 0) {
            let trailer = m.videos.results.find(v => v.type === 'Trailer' && v.site === 'YouTube') || m.videos.results[0];
            if(trailer) {
                trailerID = trailer.key;
                document.getElementById("trailer-section").style.display = "block";
                if(m.backdrop_path) document.getElementById("video-overlay").style.backgroundImage = `url('https://image.tmdb.org/t/p/w1280${m.backdrop_path}')`;
            }
        }

        if(m.images && m.images.backdrops.length > 0) {
            document.getElementById("ss-section").style.display = "block";
            const ssContainer = document.getElementById("screens");
            ssContainer.innerHTML = "";
            m.images.backdrops.slice(0, 4).forEach(img => {
                let i = document.createElement("img");
                i.src = "https://image.tmdb.org/t/p/w500" + img.file_path;
                ssContainer.appendChild(i);
            });
        }
    } catch(e) { document.getElementById("loading").innerText = "Error ❌"; }
}
load();
</script>

</body>
</html>
