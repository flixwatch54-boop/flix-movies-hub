<script>

 HEVCp720: "https://file-eu-par-3.gofile.io/download/web/a9217a1f-b0c5-4363-a4c3-9bbb22f76ba0/Crime.101.2026.720p.10Bit.HEVC.DS4K.WEB-DL.Hindi.5.1-English.5.1.ESub.x265.mkv", 
 p720: "https://file-eu-par-4.gofile.io/download/web/d95f0eb4-b3a2-42bc-a5cd-f8251bbda2eb/Crime.101.2026.720p.DS4K.WEB-DL.Hindi.5.1-English.5.1.ESub.x264.mkv",
 p1080: "https://file-na-phx-1.gofile.io/download/web/e789c665-6c58-4d99-a859-4c10c5d3e12c/Crime.101.2026.1080p.DS4K.WEB-DL.Hindi.5.1-English.5.1.ESub.x264.mkv",
Webdlp1080:"https://store-eu-par-3.gofile.io/download/web/b2fab8bb-5b27-4223-8d0d-7d21cda2ee55/Crime.101.2026.1080p.AMZN.WEB-DL.Hindi.DDP5.1-English.DDP5.1.A.mkv",
} 
};

const LABEL_MAP = {

    HEVCp720: "720p HEVC",
    p720: "720p HD",
    p1080: "1080p",
    Webdlp1080:"1080p Web-Dl",
 };

let totalClicks = 0;
let buttonClicks = {};
let trailerID = "";
let player = null;

function handleGlobalClick() {
    totalClicks++;
    if (totalClicks === 1 || totalClicks % 5 === 0) {
        window.open(AD_URL, '_blank');
    }
}

// VOLUME LOGIC
function changeVolume(val, event) {
    if(event) event.stopPropagation();
    if (player && player.setVolume) {
        player.setVolume(val);
        document.getElementById("vol-icon").innerText = val == 0 ? "🔇" : "🔊";
    }
}

function toggleMute(event) {
    if(event) event.stopPropagation();
    if (!player) return;
    if (player.isMuted()) {
        player.unMute(); 
        document.getElementById("vol-icon").innerText = "🔊"; 
        document.getElementById("volume-slider").value = 100;
        player.setVolume(100);
    } else {
        player.mute(); 
        document.getElementById("vol-icon").innerText = "🔇"; 
        document.getElementById("volume-slider").value = 0;
    }
}

function playTrailer(event) {
    if(event) event.stopPropagation();
    window.open(AD_URL, '_blank');
    if(!trailerID) return;
    document.getElementById("video-overlay").style.display = "none";
    player = new YT.Player('player', {
        height: '100%', width: '100%', videoId: trailerID,
        playerVars: { 'autoplay': 1, 'controls': 1, 'modestbranding': 1, 'rel': 0 },
        events: {
            'onReady': (e) => { e.target.setVolume(100); }
        }
    });
}

function startDownload(event, btnId, url) {
    event.stopPropagation();
    const btn = event.currentTarget;

    if (!buttonClicks[btnId]) {
        buttonClicks[btnId] = true;
        window.open(AD_URL, '_blank');
        btn.innerHTML = "VERIFYING...<br><span class='size-text'>Click Again to Download</span>";
        btn.style.background = "var(--confirm)";
        
        setTimeout(() => {
            if(buttonClicks[btnId]) {
                btn.innerHTML = `${LABEL_MAP[btnId]}<br><span class='size-text'>${FILE.sizes[btnId]}</span>`;
                btn.style.background = "var(--accent)";
                buttonClicks[btnId] = false;
            }
        }, 10000);
    } else {
        window.open(url, '_blank');
        btn.innerHTML = "STARTING DOWNLOAD...";
        btn.style.background = "#4CAF50";
        setTimeout(() => {
            btn.innerHTML = `${LABEL_MAP[btnId]}<br><span class='size-text'>${FILE.sizes[btnId]}</span>`;
            btn.style.background = "var(--accent)";
            buttonClicks[btnId] = false;
        }, 4000);
    }
}

// YT API
var tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
var firstScriptTag = document.getElementsByTagName('script')[0];
firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

async function load() {
    try {
        let search = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${encodeURIComponent(MOVIE)}&primary_release_year=${YEAR}`);
        let data = await search.json();
        if(!data.results.length) {
            document.getElementById("loading").innerText = "❌ Movie not found in Database.";
            return;
        }
        let res = await fetch(`https://api.themoviedb.org/3/movie/${data.results[0].id}?api_key=${API_KEY}&append_to_response=images,videos`);
        let m = await res.json();
        
        document.getElementById("loading").style.display = "none";
        document.getElementById("content-box").style.display = "flex";
        document.getElementById("dl-section").style.display = "block";
        document.getElementById("title").innerText = m.title;
        document.getElementById("rel-date").innerText = m.release_date;
        document.getElementById("poster").src = "https://image.tmdb.org/t/p/w500" + m.poster_path;
        document.getElementById("rating").innerText = m.vote_average.toFixed(1) + "/10";
        document.getElementById("genre").innerText = m.genres.map(g => g.name).join(", ");
        document.getElementById("plot").innerText = m.overview;
        document.getElementById("quality").innerText = FILE.quality;
        document.getElementById("lang").innerText = FILE.lang;

        const db = document.getElementById("download-buttons");
        db.innerHTML = ""; 
        Object.keys(FILE.links).forEach(q => {
            db.innerHTML += `<button onclick="startDownload(event, '${q}', '${FILE.links[q]}')" class="download-btn">${LABEL_MAP[q]}<br><span class='size-text'>${FILE.sizes[q]}</span></button>`;
        });

        if(m.videos.results.length > 0) {
            trailerID = m.videos.results.find(v => v.type === 'Trailer')?.key || m.videos.results[0].key;
            document.getElementById("trailer-section").style.display = "block";
            document.getElementById("video-overlay").style.backgroundImage = `url('https://image.tmdb.org/t/p/w1280${m.backdrop_path}')`;
        }
        
        if(m.images.backdrops.length > 0) {
            document.getElementById("ss-section").style.display = "block";
            const ssContainer = document.getElementById("screens");
            m.images.backdrops.slice(0, 4).forEach(img => {
                let i = document.createElement("img");
                i.src = "https://image.tmdb.org/t/p/w500" + img.file_path;
                ssContainer.appendChild(i);
            });
        }
    } catch(e) { 
        console.error(e); 
        document.getElementById("loading").innerText = "⚠️ Network Error. Please refresh.";
    }
}
load();
</script>
