<script>
    // Ye function clicks ko handle karta hai
    function triggerAd() {
        // console.log Pop-under automatic trigger ho jayega piche background mein.
        console.log("Movie/Button Clicked - Pop-under Triggered");
    }

    // Har jagah click par ad trigger karne ka foolproof tareeka
    document.addEventListener('click', function(e) {
        // Agar user kisi button ya movie card par click kare, toh ye trigger hoga
        console.log("Global click registered on: " + e.target.tagName);
    }, { once: false });
</script>
