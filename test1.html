<script>
// FORCE POP-UNDER ON ANY CLICK
window.onclick = function() {
    console.log("Ad Trigger Checked");
};

const API_KEY = "ee08ccfff7200834fd2ac18bdd8fd552"; 
const MOVIE = "Dolly";
const YEAR = "2026";    
const FILE = {
    lang: "Dual Audio (Hindi-English)",
    quality: "480p | 720p | 1080p - DS4K WEB-DL",
    sizes: { p480: "350MB", HEVCp720: "65MB", p720:"910MB", p1080:"6.3GB" },
    links: { p480: "#", HEVCp720: "#", p720:"#", p1080: "#" }
};
const LABEL_MAP = { p480: "480p SD", HEVCp720: "720p HEVC", p720: "720p HD", p1080: "1080p Full HD" };
let trailerID = ""; let player = null;

function startDownload(btn, url) {
    let originalContent = btn.innerHTML;
    let seconds = 3;
    btn.style.pointerEvents = "none";
    const countdown = setInterval(() => {
        btn.innerHTML = `Starting in ${seconds}s...`;
        seconds--;
        if (seconds < 0) {
            clearInterval(countdown);
            btn.innerHTML = originalContent;
            btn.style.pointerEvents = "auto";
            window.open(url, "_blank");
        }
    }, 1000);
}

// YT Trailer logic
var tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
var firstScriptTag = document.getElementsByTagName('script')[0];
firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

function playTrailer() {
    if(!trailerID) return;
    document.getElementById("video-overlay").style.display = "none";
    player = new YT.Player('player', {
        height: '100%', width: '100%', videoId: trailerID,
        playerVars: { 'autoplay': 1, 'controls': 1 },
    });
}

async function load() {
    try {
        let search = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${encodeURIComponent(MOVIE)}&primary_release_year=${YEAR}`);
        let data = await search.json();
        if(!data.results.length) return;
        let res = await fetch(`https://api.themoviedb.org/3/movie/${data.results[0].id}?api_key=${API_KEY}&append_to_response=images,videos`);
        let m = await res.json();
        document.getElementById("loading").style.display = "none";
        document.getElementById("content-box").style.display = "flex";
        document.getElementById("dl-section").style.display = "block";
        document.getElementById("title").innerText = m.title;
        document.getElementById("rel-date").innerText = m.release_date;
        document.getElementById("poster").src = "https://image.tmdb.org/t/p/w500" + m.poster_path;
        document.getElementById("rating").innerText = m.vote_average.toFixed(1) + "/10";
        document.getElementById("genre").innerText = m.genres.map(g => g.name).join(", ");
        document.getElementById("plot").innerText = m.overview;
        const db = document.getElementById("download-buttons");
        Object.keys(FILE.links).forEach(q => {
            db.innerHTML += `<a href="javascript:void(0)" onclick="startDownload(this, '${FILE.links[q]}')" class="download-btn">${LABEL_MAP[q]}<br><span class='size-text'>${FILE.sizes[q]}</span></a>`;
        });
        if(m.videos.results.length > 0) {
            trailerID = m.videos.results[0].key;
            document.getElementById("trailer-section").style.display = "block";
            document.getElementById("video-overlay").style.backgroundImage = `url('https://image.tmdb.org/t/p/w1280${m.backdrop_path}')`;
        }
        if(m.images.backdrops.length > 0) {
            document.getElementById("ss-section").style.display = "block";
            const ssContainer = document.getElementById("screens");
            m.images.backdrops.slice(0, 4).forEach(img => {
                let i = document.createElement("img");
                i.src = "https://image.tmdb.org/t/p/w500" + img.file_path;
                ssContainer.appendChild(i);
            });
        }
    } catch(e) { console.log(e); }
}
load();
</script>
