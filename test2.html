<script>
// --- POP-UNDER CONFIG ---
let popCount = 0;
// APNI DIRECT LINK YAHAN DALEIN (Adsterra/Monetag Direct Link)
const DIRECT_LINK = "https://www.profitablecpmratenetwork.com/direct-link-code"; 

function triggerSecondPop() {
    // Ye function sirf pehle click par ad kholega (Pop-under 2)
    if (popCount < 1) {
        window.open(DIRECT_LINK, '_blank');
        popCount++;
    }
}

// --- MOVIE LOGIC ---
const API_KEY = "ee08ccfff7200834fd2ac18bdd8fd552"; 
const MOVIE = "Dolly";
const YEAR = "2026";

function startDownload(btn, url) {
    // Teesri dafa ad kholne ke liye (Optional)
    window.open(DIRECT_LINK, '_blank'); 

    let original = btn.innerHTML;
    let sec = 3;
    btn.style.pointerEvents = "none";
    const timer = setInterval(() => {
        btn.innerHTML = `Wait ${sec}s...`;
        if (sec <= 0) {
            clearInterval(timer);
            btn.innerHTML = original;
            btn.style.pointerEvents = "auto";
            window.location.href = url;
        }
        sec--;
    }, 1000);
}

// API Loading...
async function load() {
    try {
        let res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${MOVIE}`);
        let data = await res.json();
        let m = data.results[0];
        document.getElementById("loading").style.display = "none";
        document.getElementById("content-box").style.display = "flex";
        document.getElementById("dl-section").style.display = "block";
        document.getElementById("title").innerText = m.title;
        document.getElementById("poster").src = "https://image.tmdb.org/t/p/w500" + m.poster_path;
        document.getElementById("rating").innerText = m.vote_average + "/10";
        document.getElementById("plot").innerText = m.overview;
        
        const db = document.getElementById("download-buttons");
        ["480p", "720p", "1080p"].forEach(q => {
            db.innerHTML += `<div class="download-btn" onclick="startDownload(this, '#')">${q} Download</div>`;
        });
    } catch(e) {}
}
load();

function playTrailer() {
    document.getElementById("video-overlay").style.display = "none";
    // Trailer Play Logic
}
</script>
