        @media (max-width: 768px) { .ss-grid { grid-template-columns: repeat(2, 1fr); } .poster { width: 100%; max-width: 300px; margin: 0 auto; display: block; } .movie-box { flex-direction: column; text-align: center; } }

<script>
// --- TMDB CONFIG ---
const API_KEY = "ee08ccfff7200834fd2ac18bdd8fd552"; 
const MOVIE = "Dolly"; 
const YEAR = "2026";    

const FILE = {
    lang: "Dual Audio (Hindi-English)",
    quality: "720p | 1080p Web-DL",
    sizes: { p720: "950MB", p1080: "2.4GB" },
    links: { p720: "https://your-link.com", p1080: "https://your-link.com" }
};

let trailerID = ""; let player = null;

// YouTube API
var tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
var firstScriptTag = document.getElementsByTagName('script')[0];
firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

function playTrailer() {
    if(!trailerID) return;
    document.getElementById("video-overlay").style.display = "none";
    player = new YT.Player('player', {
        height: '100%', width: '100%', videoId: trailerID,
        playerVars: { 'autoplay': 1, 'controls': 1 },
    });
}

function startDownload(btn, url) {
    let original = btn.innerHTML;
    let sec = 3;
    btn.style.pointerEvents = "none";
    const cd = setInterval(() => {
        btn.innerHTML = `Wait ${sec}s...`;
        sec--;
        if(sec < 0) { clearInterval(cd); btn.innerHTML = original; btn.style.pointerEvents = "auto"; window.open(url, "_blank"); }
    }, 1000);
}

async function load() {
    try {
        let s = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${encodeURIComponent(MOVIE)}&primary_release_year=${YEAR}`);
        let d = await s.json();
        if(!d.results.length) { document.getElementById("loading").innerText = "Movie Not Found ❌"; return; }
        let res = await fetch(`https://api.themoviedb.org/3/movie/${d.results[0].id}?api_key=${API_KEY}&append_to_response=images,videos`);
        let m = await res.json();

        document.getElementById("loading").style.display = "none";
        document.getElementById("content-box").style.display = "flex";
        document.getElementById("dl-section").style.display = "block";
        document.getElementById("title").innerText = m.title;
        document.getElementById("rel-date").innerText = m.release_date;
        document.getElementById("poster").src = "https://image.tmdb.org/t/p/w500" + m.poster_path;
        document.getElementById("rating").innerText = m.vote_average.toFixed(1) + "/10";
        document.getElementById("genre").innerText = m.genres.map(g => g.name).join(", ");
        document.getElementById("plot").innerText = m.overview;
        document.getElementById("quality").innerText = FILE.quality;

        const db = document.getElementById("download-buttons");
        Object.keys(FILE.links).forEach(q => {
            db.innerHTML += `<a href="javascript:void(0)" onclick="startDownload(this, '${FILE.links[q]}')" class="download-btn">${q.replace('p','') + 'p HD'}<br><span class='size-text'>${FILE.sizes[q]}</span></a>`;
        });

        if(m.videos.results.length) trailerID = m.videos.results[0].key;
        if(m.images.backdrops.length) {
            document.getElementById("ss-section").style.display = "block";
            m.images.backdrops.slice(0, 4).forEach(img => {
                let i = document.createElement("img");
                i.src = "https://image.tmdb.org/t/p/w500" + img.file_path;
                document.getElementById("screens").appendChild(i);
            });
        }
    } catch(e) { console.log(e); }
}
load();
</script>
