<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Download Hub</title>

<style>
:root { --accent:#00bcd4; --bg:#0f0f0f; --card:#1e1e1e; --sub:#2a2a2a; }

body {
    margin:0;
    font-family:Segoe UI;
    background:var(--bg);
    color:white;
}

.container {
    max-width:1000px;
    margin:20px auto;
    padding:20px;
    background:var(--card);
    border-radius:12px;
}

.movie-box {
    display:flex;
    flex-wrap:wrap;
    gap:20px;
}

.poster {
    width:300px;
    aspect-ratio:2/3;
    border-radius:10px;
    object-fit:cover;
}

.details {
    flex:1;
    background:var(--sub);
    padding:20px;
    border-radius:10px;
}

h1 { color:var(--accent); }

.screenshots { margin-top:20px; }

.ss-grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:10px;
}

.ss-grid img {
    width:100%;
    border-radius:8px;
}

.download-section {
    text-align:center;
    margin-top:30px;
    padding:20px;
    background:var(--sub);
    border-radius:10px;
}

.download-btn {
    display:inline-block;
    margin:10px;
    padding:12px 20px;
    background:var(--accent);
    color:white;
    text-decoration:none;
    border-radius:8px;
}

.size-text {
    display:block;
    font-size:12px;
    color:lightblue;
}

.loading {
    text-align:center;
    color:#ccc;
}

</style>
</head>

<body>

<div class="container">

<p class="loading" id="loading">Loading movie...</p>

<div class="movie-box">
<img class="poster" id="poster">

<div class="details">
<h1 id="title">Loading...</h1>
<p><strong>⭐ Rating:</strong> <span id="rating"></span></p>
<p><strong>Genre:</strong> <span id="genre"></span></p>
<p><strong>Language:</strong> <span id="lang"></span></p>
<p><strong>Quality:</strong> <span id="quality"></span></p>
<p><strong>Duration:</strong> <span id="duration"></span></p>
<p><strong>Story:</strong><br><span id="plot"></span></p>
</div>
</div>

<div class="screenshots" id="ss-section" style="display:none;">
<h3>Screenshots</h3>
<div class="ss-grid" id="screens"></div>
</div>

<div class="download-section">
<h2>Download Links</h2>
<!-- === 480p === -->
<a class="download-btn" id="link480" href="https://vcloud.zip/kcn_nd_ness3enc" target="_blank">
480p
<span class="size-text" id="size480"></span>
</a>
<!-- === 720p === -->
<a class="download-btn" id="link720" href="https://vcloud.zip/j8my8na4l6ylyy1" target="_blank">
720p
<span class="size-text" id="size720"></span>
</a>


</div>

</div>

<script>

const API_KEY = "ee08ccfff7200834fd2ac18bdd8fd552"; // apni TMDB key lagao
const MOVIE = "National Treasure";

const FILE = {
    lang:"Hindi + English",
    quality:"480p | 720p  BluRay",
    sizes:{
        p480:"450MB",
        p720:"1.20GB",

    },
    links:{
        p480:"https://vcloud.zip/kcn_nd_ness3enc",
        p720:"https://vcloud.zip/j8my8na4l6ylyy1",
    
    }
};

function runtime(m){
    if(!m) return "N/A";
    return Math.floor(m/60)+"h "+(m%60)+"m";
}

async function load(){

try{

let search = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${MOVIE}`);
let data = await search.json();

if(!data.results.length){
    document.getElementById("title").innerText="Movie Not Found ❌";
    return;
}

let id = data.results[0].id;

let res = await fetch(`https://api.themoviedb.org/3/movie/${id}?api_key=${API_KEY}&append_to_response=images`);
let m = await res.json();

// UI
document.getElementById("loading").style.display="none";

document.getElementById("title").innerText = m.title + " ("+m.release_date.slice(0,4)+")";
document.getElementById("poster").src = "https://image.tmdb.org/t/p/w500"+m.poster_path;
document.getElementById("rating").innerText = m.vote_average;
document.getElementById("genre").innerText = m.genres.map(g=>g.name).join(", ");
document.getElementById("plot").innerText = m.overview;
document.getElementById("duration").innerText = runtime(m.runtime);

// manual
document.getElementById("lang").innerText = FILE.lang;
document.getElementById("quality").innerText = FILE.quality;

document.getElementById("size480").innerText = FILE.sizes.p480;
document.getElementById("size720").innerText = FILE.sizes.p720;


document.getElementById("link480").href = FILE.links.p480;
document.getElementById("link720").href = FILE.links.p720;


// screenshots
let ss = document.getElementById("screens");
ss.innerHTML="";

if(m.images.backdrops.length){
    document.getElementById("ss-section").style.display="block";
    m.images.backdrops.slice(0,4).forEach(img=>{
        let i = document.createElement("img");
        i.src = "https://image.tmdb.org/t/p/w500"+img.file_path;
        ss.appendChild(i);
    });
}

}catch(e){
    document.getElementById("title").innerText="Error Loading ❌";
}

}

load();

</script>

</body>
</html>
