<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Finder - Premium Player</title>

    <style>
        :root { --accent:#00bcd4; --bg:#0f0f0f; --card:#1e1e1e; --sub:#2a2a2a; }
        body { margin:0; font-family:'Segoe UI', sans-serif; background:var(--bg); color:white; }
        .container { max-width:900px; margin:15px auto; padding:15px; background:var(--card); border-radius:12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        /* SEARCH BOX STYLING */
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        #movie-input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #111; color: white; outline: none; }
        #search-btn { padding: 10px 20px; background: var(--accent); border: none; border-radius: 8px; color: white; cursor: pointer; font-weight: bold; }

        .movie-box { display:flex; flex-wrap:wrap; gap:15px; }
        .poster { width:260px; aspect-ratio:2/3; border-radius:10px; object-fit:cover; border: 1px solid #333; }
        .details { flex:1; background:var(--sub); padding:15px; border-radius:10px; font-size: 14px; }
        h1 { color:var(--accent); margin: 0 0 10px 0; font-size: 24px; }
        h3 { border-left: 3px solid var(--accent); padding-left: 10px; margin: 25px 0 12px 0; font-size: 18px; color: #eee; }

        .trailer-section { max-width: 750px; margin: 20px auto; display: none; }
        .player-wrapper { position: relative; width: 100%; padding-bottom: 56.25%; background: #000; border-radius: 12px; overflow: hidden; border: 1px solid #333; }
        #player { position: absolute; top: -55px; left: 0; width: 100%; height: calc(100% + 110px); z-index: 1; background: #000; }
        
        .volume-panel { margin-top: 10px; display: flex !important; align-items: center; gap: 12px; background: var(--sub); padding: 8px 15px; border-radius: 8px; width: fit-content; border-left: 3px solid var(--accent); }
        #volume-slider { width: 100px; accent-color: var(--accent); }
        .video-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; z-index: 10; cursor: pointer; }
        .video-overlay::before { content: ""; position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .play-btn { width: 70px; height: 70px; background: rgba(0, 188, 212, 0.9); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 11; border: 3px solid white; }
        .play-btn::after { content: ""; border-style: solid; border-width: 12px 0 12px 20px; border-color: transparent transparent transparent white; margin-left: 5px; }

        .ss-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .ss-grid img { width: 100%; border-radius: 6px; border: 1px solid #444; }
        .download-section { text-align:center; margin-top:20px; padding:15px; background:var(--sub); border-radius:10px; }
        .download-btn { display:inline-block; margin:5px; padding:12px 22px; background:var(--accent); color:white; text-decoration:none; border-radius:8px; font-weight: bold; }

        @media (max-width: 600px) { .ss-grid { grid-template-columns: repeat(2, 1fr); } .poster { width: 100%; } .movie-box { flex-direction: column; } }
    </style>
</head>
<body>

<div class="container">
    <div class="search-box">
        <input type="text" id="movie-input" placeholder="Enter Movie Name (e.g. Krantiveer)...">
        <button id="search-btn" onclick="loadMovie()">Search</button>
    </div>

    <p id="status-msg" style="text-align:center; color:#999;">Search for a movie to see details.</p>

    <div class="movie-box" id="content-box" style="display:none;">
        <img class="poster" id="poster" alt="Movie Poster">
        <div class="details">
            <h1 id="title"></h1>
            <p><strong>⭐ Rating:</strong> <span id="rating"></span></p>
            <p><strong>Genre:</strong> <span id="genre"></span></p>
            <p><strong>Language:</strong> Hindi</p>
            <p><strong>Story:</strong><br><span id="plot" style="color:#ccc; line-height:1.5;"></span></p>
        </div>
    </div>

    <div class="trailer-section" id="trailer-section">
        <h3>Official Trailer</h3>
        <div class="player-wrapper">
            <div class="video-overlay" id="video-overlay" onclick="playTrailer()">
                <div class="play-btn"></div>
            </div>
            <div id="player"></div> 
        </div>
        <div class="volume-panel">
            <span class="vol-icon" onclick="toggleMute()" id="vol-icon" style="cursor:pointer">🔊</span>
            <input type="range" id="volume-slider" min="0" max="100" value="100" oninput="changeVolume(this.value)">
        </div>
    </div>

    <div class="screenshots" id="ss-section" style="display:none;">
        <h3>Screenshots</h3>
        <div class="ss-grid" id="screens"></div>
    </div>

    <div class="download-section" id="dl-section" style="display:none;">
        <h3>Download Options</h3>
        <div id="download-buttons">
            <a href="#" class="download-btn">480p <br><small>400MB</small></a>
            <a href="#" class="download-btn">720p <br><small>1.2GB</small></a>
            <a href="#" class="download-btn">1080p <br><small>2.5GB</small></a>
        </div>
    </div>
</div>

<script>
const API_KEY = "ee08ccfff7200834fd2ac18bdd8fd552"; 
let trailerID = ""; 
let player = null;

// YouTube API Load
var tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
document.getElementsByTagName('head')[0].appendChild(tag);

async function loadMovie() {
    const input = document.getElementById("movie-input").value;
    if(!input) return alert("Movie name likho!");

    const status = document.getElementById("status-msg");
    status.innerText = "Searching...";
    status.style.display = "block";
    document.getElementById("content-box").style.display = "none";
    document.getElementById("trailer-section").style.display = "none";
    document.getElementById("ss-section").style.display = "none";
    document.getElementById("dl-section").style.display = "none";

    try {
        // Step 1: Search Movie
        let searchRes = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${encodeURIComponent(input)}`);
        let searchData = await searchRes.json();
        
        if(!searchData.results.length) {
            status.innerText = "Movie nahi mili! ❌";
            return;
        }

        // Step 2: Get Full Details & Videos
        const movieID = searchData.results[0].id;
        let detailRes = await fetch(`https://api.themoviedb.org/3/movie/${movieID}?api_key=${API_KEY}&append_to_response=videos,images`);
        let m = await detailRes.json();

        status.style.display = "none";
        document.getElementById("content-box").style.display = "flex";
        document.getElementById("dl-section").style.display = "block";

        // Fill Details
        document.getElementById("title").innerText = `${m.title} (${m.release_date.slice(0,4)})`;
        document.getElementById("poster").src = "https://image.tmdb.org/t/p/w500" + m.poster_path;
        document.getElementById("rating").innerText = m.vote_average.toFixed(1) + "/10";
        document.getElementById("genre").innerText = m.genres.map(g => g.name).join(", ");
        document.getElementById("plot").innerText = m.overview;

        // TRAILER LOGIC (Fixed)
        if(m.videos && m.videos.results.length > 0) {
            // Priority: Trailer > Teaser > Any Video
            let trailer = m.videos.results.find(v => v.type === 'Trailer' && v.site === 'YouTube') 
                          || m.videos.results.find(v => v.site === 'YouTube');
            
            if(trailer) {
                trailerID = trailer.key;
                document.getElementById("trailer-section").style.display = "block";
                if(m.backdrop_path) {
                    document.getElementById("video-overlay").style.backgroundImage = `url('https://image.tmdb.org/t/p/w1280${m.backdrop_path}')`;
                }
                document.getElementById("video-overlay").style.display = "flex";
                if(player) { player.destroy(); player = null; }
            }
        }

        // Screenshots Logic
        if(m.images && m.images.backdrops.length > 0) {
            document.getElementById("ss-section").style.display = "block";
            const ssContainer = document.getElementById("screens");
            ssContainer.innerHTML = "";
            m.images.backdrops.slice(0, 4).forEach(img => {
                ssContainer.innerHTML += `<img src="https://image.tmdb.org/t/p/w500${img.file_path}">`;
            });
        }

    } catch(e) {
        status.innerText = "Error occurred! ❌";
    }
}

function playTrailer() {
    if(!trailerID) return;
    document.getElementById("video-overlay").style.display = "none";
    player = new YT.Player('player', {
        height: '100%', width: '100%', videoId: trailerID,
        playerVars: { 'autoplay': 1, 'controls': 1 },
        events: { 'onStateChange': (e) => { if(e.data == YT.PlayerState.ENDED) closePlayer(); } }
    });
}

function closePlayer() {
    if(player) { player.destroy(); player = null; }
    document.getElementById("video-overlay").style.display = "flex";
}

function changeVolume(val) { if(player && player.setVolume) player.setVolume(val); }
function toggleMute() {
    if(!player) return;
    if(player.isMuted()) { player.unMute(); document.getElementById("vol-icon").innerText = "🔊"; }
    else { player.mute(); document.getElementById("vol-icon").innerText = "🔇"; }
}
</script>

</body>
</html>
