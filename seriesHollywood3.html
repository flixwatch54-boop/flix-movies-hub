        .ad-slot { margin: 20px auto; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(255,255,255,0.02); border: 1px dashed #333; padding: 10px; border-radius: 8px; min-height: 60px; }
        .ad-label { font-size: 10px; color: #555; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; }
        .sticky-footer-ad { position: fixed; bottom: 0; left: 0; width: 100%; background: #1a1a1a; z-index: 2000; text-align: center; border-top: 1px solid var(--accent); padding: 5px 0; }
        .movie-box { display:flex; flex-wrap:wrap; gap:20px; justify-content: center; }
        .poster-container { width: 280px; flex-shrink: 0; }
        .poster { width:100%; aspect-ratio:2/3; border-radius:12px; object-fit:cover; border: 1px solid #333; }
        .details { flex:1; min-width: 300px; background:var(--sub); padding:20px; border-radius:12px; border: 1px solid #333; }
        .details p { margin: 10px 0; font-size: 14.5px; border-bottom: 1px solid #383838; padding-bottom: 6px; }
        .details p strong { color: var(--accent); display: inline-block; width: 140px; }
        h1 { color:var(--accent); margin: 0 0 15px 0; font-size: clamp(22px, 5vw, 30px); }

        /* Trailer & Volume Styles */
        .trailer-section { width: 100%; max-width: 850px; margin: 30px auto; display: none; }
        .player-wrapper { position: relative; width: 100%; padding-bottom: 56.25%; background: #000; border-radius: 15px; overflow: hidden; border: 2px solid #333; }
        #player { position: absolute; top: -65px; left: -2px; width: calc(100% + 4px); height: calc(100% + 130px); z-index: 1; }
        .video-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; z-index: 10; cursor: pointer; }
        .video-overlay::before { content: ""; position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .play-btn { width: 75px; height: 75px; background: var(--accent); border-radius: 50%; border: 4px solid white; position: relative; z-index: 11; transition: 0.3s; }
        .volume-panel { margin-top: 10px; display: flex !important; align-items: center; gap: 12px; background: var(--sub); padding: 8px 15px; border-radius: 8px; width: fit-content; border-left: 3px solid var(--accent); }
        .vol-icon { font-size: 18px; cursor: pointer; color: var(--accent); }
        #volume-slider { cursor: pointer; width: 100px; height: 4px; accent-color: var(--accent); }

        .selector-box { text-align: center; padding: 25px; background: var(--sub); border-radius: 12px; margin: 20px 0; border: 1px solid #333; }
        .episode-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; margin-top: 20px; }
        .episode-card { background: var(--sub); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #333; }
        .ep-size { display: block; font-size: 12px; color: var(--accent); margin-bottom: 8px; font-weight: bold; }
        .download-btn { display:inline-block; padding:12px; background:var(--accent); color:#000; text-decoration:none; border-radius:8px; font-weight: bold; font-size: 14px; cursor: pointer; border:none; width: 100%; transition: 0.3s; margin-top: 5px; }
        .ss-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        .ss-grid img { width: 100%; border-radius: 8px; border: 1px solid #444; }
        @media (max-width: 768px) { .poster-container { width: 100%; max-width: 280px; margin: 0 auto; } .ss-grid { grid-template-columns: repeat(2, 1fr); } .hide-mobile { display: none; } }

let seriesID = "", currentS = null, currentQ = "", trailerID = "", player = null;
let buttonClicks = {};
let totalClicks = 0;

window.addEventListener('click', function() {
    totalClicks++;
    if (totalClicks % 5 === 0) { window.open(AD_URL, '_blank'); }
    if (totalClicks <= 2) { window.open(AD_URL, '_blank'); }
}, true);

// VOLUME & PLAYER FUNCTIONS
function changeVolume(val) {
    if (player && player.setVolume) {
        player.setVolume(val);
        document.getElementById("vol-icon").innerText = val == 0 ? "🔇" : "🔊";
    }
}

function toggleMute() {
    if (player && player.isMuted()) {
        player.unMute(); 
        document.getElementById("vol-icon").innerText = "🔊"; 
        document.getElementById("volume-slider").value = 100;
    } else if (player) {
        player.mute(); 
        document.getElementById("vol-icon").innerText = "🔇"; 
        document.getElementById("volume-slider").value = 0;
    }
}

function playTrailer() {
    window.open(AD_URL, '_blank');
    if (!trailerID) return;
    document.getElementById("video-overlay").style.display = "none";
    player = new YT.Player('player', { 
        videoId: trailerID, 
        playerVars: { 'autoplay': 1, 'rel': 0, 'modestbranding': 1, 'controls': 1 },
        events: { 'onReady': (e) => { e.target.setVolume(100); } }
    });
}

function resetTrailerUI() {
    if (player) { player.destroy(); player = null; }
    document.getElementById("player").innerHTML = "";
    document.getElementById("video-overlay").style.display = "flex";
}

function changeSeason(n) {
    window.open(AD_URL, '_blank');
    currentS = n;
    resetTrailerUI();
    document.querySelectorAll('.season-btn').forEach(b => { b.style.background = "#444"; });
    document.getElementById(`sbtn-${n}`).style.background = "var(--accent)";
    
    const qBox = document.getElementById("quality-buttons");
    qBox.innerHTML = "";
    const qualities = EPISODE_LINKS["S"+n];
    for(let q in qualities) {
        qBox.innerHTML += `<button class="download-btn q-btn" id="qbtn-${q}" style="width:auto; margin:5px; background:#444;" onclick="setQuality('${q}')">${q}</button>`;
    }
    setQuality(Object.keys(qualities)[0], true);
    loadTrailer(n);
}

function setQuality(q, isInitial = false) {
    if(!isInitial) window.open(AD_URL, '_blank');
    currentQ = q;
    document.querySelectorAll('.q-btn').forEach(b => { b.style.background = "#444"; });
    if(document.getElementById(`qbtn-${q}`)) document.getElementById(`qbtn-${q}`).style.background = "var(--accent)";
    
    fetch(`https://api.themoviedb.org/3/tv/${seriesID}/season/${currentS}?api_key=${API_KEY}`)
        .then(res => res.json()).then(data => renderEpisodes(data.episodes));
}

function startDownload(uniqueId, url) {
    if (!buttonClicks[uniqueId]) {
        buttonClicks[uniqueId] = true;
        window.open(AD_URL, '_blank');
        document.getElementById(uniqueId).innerHTML = "Verify & Download";
        document.getElementById(uniqueId).style.background = "#ff9800";
    } else {
        window.open(url, '_blank');
        buttonClicks[uniqueId] = false;
        document.getElementById(uniqueId).innerHTML = "Download Now";
        document.getElementById(uniqueId).style.background = "var(--accent)";
    }
}

async function init() {
    try {
        const search = await fetch(`https://api.themoviedb.org/3/search/tv?api_key=${API_KEY}&query=${encodeURIComponent(SERIES_NAME)}&first_air_date_year=${SERIES_YEAR}`);
        const data = await search.json();
        if(!data.results.length) return;
        
        seriesID = data.results[0].id;
        const main = await fetch(`https://api.themoviedb.org/3/tv/${seriesID}?api_key=${API_KEY}`);
        const s = await main.json();
        
        document.getElementById("loading").style.display = "none";
        document.getElementById("content-box").style.display = "flex";
        document.getElementById("title").innerText = s.name;
        document.getElementById("poster").src = "https://image.tmdb.org/t/p/w500" + s.poster_path;
        document.getElementById("rating").innerText = s.vote_average.toFixed(1) + "/10";
        document.getElementById("genre").innerText = s.genres.map(g => g.name).join(", ");
        document.getElementById("plot").innerText = s.overview;
        document.getElementById("release-year").innerText = s.first_air_date.split('-')[0];
        document.getElementById("duration").innerText = (s.episode_run_time[0] || "N/A") + " min";

        const sBox = document.getElementById("season-buttons");
        let firstS = null;
        for(let i=1; i <= s.number_of_seasons; i++) {
            if (EPISODE_LINKS["S"+i]) {
                if(!firstS) firstS = i;
                sBox.innerHTML += `<button class="download-btn season-btn" id="sbtn-${i}" style="width:auto; margin:5px; background:#444; color:#fff" onclick="changeSeason(${i})">Season ${i}</button>`;
            }
        }
        if(firstS) { document.getElementById("selection-area").style.display = "block"; changeSeason(firstS); }
        loadScreenshots();
    } catch (e) { console.error(e); }
}

function renderEpisodes(tmdbEpisodes) {
    const eGrid = document.getElementById("episode-grid");
    eGrid.innerHTML = "";
    const config = EPISODE_LINKS["S"+currentS][currentQ];
    
    tmdbEpisodes.forEach((ep, i) => {
        let link = config.episodes[i] || "#";
        let uniqueId = `ep-${currentS}-${currentQ}-${ep.episode_number}`;
        eGrid.innerHTML += `
            <div class="episode-card">
                <span style="font-weight:bold">Episode ${ep.episode_number}</span>
                <span class="ep-size">Size: ${config.epSize}</span>
                <button id="${uniqueId}" class="download-btn" onclick="startDownload('${uniqueId}', '${link}')">Download</button>
            </div>`;
    });
    document.getElementById("episodes-section").style.display = "block";
    if(config.pack) {
        document.getElementById("pack-section").style.display = "block";
        document.getElementById("pack-buttons").innerHTML = `<button id="p-${currentS}" class="download-btn" onclick="startDownload('p-${currentS}', '${config.pack}')">Download Full Season (${config.packSize})</button>`;
    }
}

async function loadTrailer(sNum) {
    const res = await fetch(`https://api.themoviedb.org/3/tv/${seriesID}/season/${sNum}?api_key=${API_KEY}&append_to_response=videos`);
    const data = await res.json();
    let tr = data.videos.results.find(v => v.type === 'Trailer') || data.videos.results[0];
    if(tr) {
        trailerID = tr.key;
        document.getElementById("trailer-section").style.display = "block";
        document.getElementById("video-overlay").style.display = "flex";
        document.getElementById("video-overlay").style.backgroundImage = `url('https://image.tmdb.org/t/p/w1280${data.poster_path || ''}')`;
    }
}

async function loadScreenshots() {
    const res = await fetch(`https://api.themoviedb.org/3/tv/${seriesID}/images?api_key=${API_KEY}`);
    const data = await res.json();
    const screens = document.getElementById("screens");
    screens.innerHTML = "";
    if(data.backdrops.length > 0) {
        document.getElementById("ss-section").style.display = "block";
        data.backdrops.slice(0, 8).forEach(img => {
            screens.innerHTML += `<img src="https://image.tmdb.org/t/p/w500${img.file_path}" alt="screenshot">`;
        });
    }
}

var tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api";
